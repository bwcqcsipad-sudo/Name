<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายชื่อระบบ ID ลำดับ & เวลาไทย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen p-4">

    <div class="max-w-md mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 mb-8">
            <h2 class="text-xl font-bold mb-5 text-slate-800 flex items-center">
                <span class="bg-blue-600 w-2 h-6 rounded-full mr-3"></span>
                เพิ่มรายชื่อใหม่
            </h2>
            <div class="space-y-4">
                <input type="text" id="nameInput" placeholder="ชื่อ-นามสกุล" 
                    class="w-full border border-slate-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                
                <input type="file" id="fileInput" accept="image/*" 
                    class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                
                <button onclick="saveData()" id="btnSave" 
                    class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg active:scale-95 disabled:bg-slate-400">
                    บันทึกข้อมูล
                </button>
            </div>
        </div>

        <h2 class="text-lg font-bold mb-4 text-slate-700 flex justify-between items-center">
            รายชื่อในระบบ 
            <span id="count" class="text-sm font-normal bg-slate-200 px-3 py-1 rounded-full">0 รายการ</span>
        </h2>
        <div id="listDisplay" class="space-y-3">
            </div>
    </div>

    <script>
        // --- ส่วนการตั้งค่า (ใส่ค่าของคุณที่นี่) ---
        const SB_URL = 'https://pfobzathluoivoufkdwj.supabase.co'
        const SB_KEY = 'sb_publishable_q3xJiQ7LRJGkVMVkKbxrsA_A6eFhTaC'
        // ----------------------------------

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY)

        // 1. ฟังก์ชันโหลดข้อมูลมาแสดง
        async function loadProfiles() {
            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .order('id', { ascending: true }) // เรียงตาม ID 1, 2, 3

                if (error) throw error

                document.getElementById('count').innerText = `${data.length} รายการ`
                const container = document.getElementById('listDisplay')
                
                container.innerHTML = data.map(item => {
                    // ปรับแต่งเวลาเป็นรูปแบบไทย
                    const thaiTime = new Date(item.created_at).toLocaleString('th-TH', {
                        timeZone: 'Asia/Bangkok',
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    })

                    return `
                        <div class="bg-white p-4 rounded-xl border border-slate-200 flex items-center gap-4 shadow-sm hover:shadow-md transition">
                            <div class="bg-blue-100 text-blue-700 font-bold w-8 h-8 rounded-full flex items-center justify-center text-sm shrink-0">
                                ${item.id}
                            </div>
                            <img src="${item.image_url}" class="w-12 h-12 rounded-full object-cover bg-slate-100 border border-slate-100">
                            <div class="overflow-hidden">
                                <p class="font-bold text-slate-800 truncate">${item.name}</p>
                                <p class="text-[11px] text-slate-400 italic">${thaiTime}</p>
                            </div>
                        </div>
                    `
                }).join('')
            } catch (err) {
                console.error('Error:', err.message)
            }
        }

        // 2. ฟังก์ชันบันทึกข้อมูล
        async function saveData() {
            const name = document.getElementById('nameInput').value
            const file = document.getElementById('fileInput').files[0]
            const btn = document.getElementById('btnSave')

            if (!name || !file) return alert('กรุณากรอกชื่อและเลือกรูปภาพ')

            btn.disabled = true
            btn.textContent = 'กำลังบันทึก...'

            try {
                // A. อัพโหลดรูป
                const fileName = `user_${Date.now()}.png`
                const { data: upData, error: upError } = await supabaseClient.storage
                    .from('avatars')
                    .upload(fileName, file)

                if (upError) throw upError

                // B. รับ URL
                const { data: urlData } = supabaseClient.storage.from('avatars').getPublicUrl(fileName)
                const imageUrl = urlData.publicUrl

                // C. บันทึกลงตาราง (ID และ เวลา จะถูกเจนอัตโนมัติที่หลังบ้าน)
                const { error: insError } = await supabaseClient
                    .from('profiles')
                    .insert([{ name: name, image_url: imageUrl }])

                if (insError) throw insError

                // ล้างค่าฟอร์มและโหลดใหม่
                document.getElementById('nameInput').value = ''
                document.getElementById('fileInput').value = ''
                loadProfiles()
                
            } catch (err) {
                alert('เกิดข้อผิดพลาด: ' + err.message)
            } finally {
                btn.disabled = false
                btn.textContent = 'บันทึกข้อมูล'
            }
        }

        // โหลดข้อมูลทันทีเมื่อเปิดหน้า
        loadProfiles()
    </script>
</body>
</html>
